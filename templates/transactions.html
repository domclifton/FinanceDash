{% extends "base.html" %}
{% block content %}
<div class="page-header"><div><p class="eyebrow">History</p><h1>Transactions</h1></div><a class="btn btn-outline-light" href="{{ url_for('export_transactions') }}">Export CSV</a></div>

<section class="panel mb-4">
    <h5>Quick Transaction</h5>
    <form method="post" action="{{ url_for('add_transaction') }}" class="row g-2">
        <div class="col-md-3"><select class="form-select" name="account_id">{% for account in accounts %}<option value="{{ account.id }}">{{ account.name }}</option>{% endfor %}</select></div>
        <div class="col-md-2"><select class="form-select" name="transaction_type"><option value="add">Add</option><option value="remove">Remove</option></select></div>
        <div class="col-md-2"><input class="form-control" name="amount" type="number" step="0.01" placeholder="Amount" required></div>
        <div class="col-md-3"><input class="form-control" name="note" placeholder="Note"></div>
        <div class="col-md-2"><button class="btn btn-primary w-100">Save</button></div>
    </form>
</section>

<section class="panel">
    <h5>Latest Transactions</h5>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead><tr><th>Date</th><th>Account</th><th>Type</th><th>Note</th><th class="text-end">Amount</th></tr></thead>
            <tbody>
            {% for tx in transactions %}
            <tr>
                <td>{{ tx.created_at }}</td><td>{{ tx.account_name }}</td><td>{{ tx.account_type }}</td><td>{{ tx.note }}</td>
                <td class="text-end {{ 'positive' if tx.amount >= 0 else 'negative' }}">{{ tx.amount|money }}</td>
            </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
