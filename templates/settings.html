{% extends "base.html" %}
{% block content %}
<div class="page-header"><div><p class="eyebrow">Configuration</p><h1>Settings</h1></div></div>

<section class="panel">
    <h5>Metal Pricing</h5>
    <p class="muted">Live prices use GoldAPI when GOLDAPI_KEY is set. Manual prices are used as fallback.</p>
    <form method="post" class="row g-3">
        <div class="col-md-3">
            <label class="form-label">Manual gold £/g</label>
            <input class="form-control" name="manual_gold_gbp_per_g" type="number" step="0.0001" value="{{ manual_gold_gbp_per_g }}">
        </div>
        <div class="col-md-3">
            <label class="form-label">Manual silver £/g</label>
            <input class="form-control" name="manual_silver_gbp_per_g" type="number" step="0.0001" value="{{ manual_silver_gbp_per_g }}">
        </div>
        <div class="col-md-3 d-flex align-items-end">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="use_live_prices" {% if use_live_prices %}checked{% endif %}>
                <label class="form-check-label">Use live prices</label>
            </div>
        </div>
        <div class="col-md-3 d-flex align-items-end">
            <button class="btn btn-primary w-100">Save</button>
        </div>
    </form>
    <hr>
    <p>GoldAPI key detected: <strong>{{ 'Yes' if has_goldapi_key else 'No' }}</strong></p>
</section>
{% endblock %}
